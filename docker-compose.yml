services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: maimai-back
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./back/data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: maimai-front
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://back:8000
    depends_on:
      - back
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501